# Flink JobManager 集群内服务，提供 REST 提交和 RPC 调度入口。
apiVersion: v1
kind: Service
metadata:
  name: canvas-flink-jobmanager
  namespace: canvas
  labels:
    app.kubernetes.io/name: canvas-flink
    app.kubernetes.io/component: flink-jobmanager
    app.kubernetes.io/part-of: marketing-canvas
spec:
  # 仅在集群内暴露，外部排障可通过 kubectl port-forward 访问。
  type: ClusterIP
  # 只选择 JobManager Pod，避免请求落到 TaskManager。
  selector:
    app.kubernetes.io/name: canvas-flink
    app.kubernetes.io/component: flink-jobmanager
  ports:
    # REST 端口用于作业提交、Flink UI、探针和监控。
    - name: rest
      port: 8081
      targetPort: rest
    # RPC 端口用于 TaskManager 注册和内部调度通信。
    - name: rpc
      port: 6123
      targetPort: rpc
