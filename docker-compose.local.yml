# 本地开发依赖（设计文档附录 D）
# 启动：docker compose -f docker-compose.local.yml up -d
# 后端默认依赖 RocketMQ：rocketmq.name-server=localhost:9876

services:
  mysql:
    image: mysql:8.0
    container_name: canvas-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: canvas_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - canvas-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: canvas-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - canvas-redis-data:/data

  # WireMock：模拟外部集成接口（券系统 / Tagger / 触达平台）
  wiremock:
    image: wiremock/wiremock:3.3.1
    container_name: canvas-wiremock
    ports:
      - "8099:8080"
    volumes:
      - ./wiremock:/home/wiremock

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  # 官方镜像中的 broker 以 uid=3000(rocketmq) 运行；named volume 初始为 root:root。
  # 启动 broker 前先修正 logs/store 权限，避免 broker 初始化持久化目录失败。
  rocketmq-init:
    image: apache/rocketmq:5.3.1
    user: root
    command: >
      sh -c "mkdir -p /home/rocketmq/logs /home/rocketmq/store
      && chown -R 3000:3000 /home/rocketmq/logs /home/rocketmq/store"
    volumes:
      - canvas-rocketmq-logs:/home/rocketmq/logs
      - canvas-rocketmq-store:/home/rocketmq/store

  # RocketMQ：MQ 触发消费和 SEND_MQ 节点发送都依赖本地 namesrv/broker。
  # brokerIP1=127.0.0.1 写在 rocketmq/broker.conf，保证宿主机后端能连到 10911。
  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.3.1/conf/broker.conf
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
      - JAVA_OPT_EXT=-Xms512m -Xmx512m
    depends_on:
      rocketmq-namesrv:
        condition: service_started
      rocketmq-init:
        condition: service_completed_successfully
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.1/conf/broker.conf
      - canvas-rocketmq-logs:/home/rocketmq/logs
      - canvas-rocketmq-store:/home/rocketmq/store

  # RocketMQ Dashboard：可视化查看 topic/consumer/group 等信息。
  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=rocketmq-namesrv:9876
    depends_on:
      rocketmq-namesrv:
        condition: service_started
    ports:
      - "8081:8082"

  # Doris 2.0 OLAP：执行轨迹与报表聚合的本地验证环境。
  doris-fe:
    image: apache/doris:2.0.3-fe
    container_name: canvas-doris-fe
    hostname: doris-fe
    environment:
      - FE_SERVERS=fe1:doris-fe:9010
      - FE_ID=1
    ports:
      - "8030:8030"
      - "9010:9010"
      - "9030:9030"
    volumes:
      - canvas-doris-fe-meta:/opt/apache-doris/fe/doris-meta
      - ./infrastructure/doris:/docker-entrypoint-initdb.d:ro

  doris-be:
    image: apache/doris:2.0.3-be
    container_name: canvas-doris-be
    hostname: doris-be
    environment:
      - FE_SERVERS=fe1:doris-fe:9010
      - BE_ADDR=doris-be:9050
    depends_on:
      - doris-fe
    ports:
      - "8040:8040"
      - "9050:9050"
      - "9060:9060"
    volumes:
      - canvas-doris-be-storage:/opt/apache-doris/be/storage

volumes:
  canvas-mysql-data:
  canvas-redis-data:
  canvas-rocketmq-logs:
  canvas-rocketmq-store:
  canvas-doris-fe-meta:
  canvas-doris-be-storage:
