spring:
  application:
    name: canvas-engine
  main:
    web-application-type: reactive
  datasource:
    url: jdbc:mysql://localhost:3306/canvas_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      # password: （无密码时注释掉）
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

canvas:
  jwt:
    secret: canvas-engine-jwt-secret-key-must-be-at-least-256-bits-long
    expiry-hours: 24
  cors:
    # 生产环境必须改为实际前端域名，禁止用 * 上线
    # 覆盖方式：CANVAS_CORS_ALLOWED_ORIGINS=https://canvas.yourcompany.com
    allowed-origins: "*"
  redis:
    key-prefix: canvas  # key 命名空间前缀（设计文档 25.3.1节），多环境共用 Redis 时修改
  version:
    max-keep-count: 10  # 每个画布保留最近 N 个已发布版本（设计文档 17.2节）
  # Disruptor 无锁分发层（12.8节）
  disruptor:
    ring-buffer-size: 65536   # 必须是 2 的幂，2^16 ≈ 16MB
    consumers: 0              # 0 = 自动使用 CPU 核数
  # 执行引擎
  execution:
    global-timeout-sec: 600
    context-ttl-sec: 86400
    max-concurrency: 1000
    max-retry: 3
    retry-base-delay-ms: 1000
    retry-max-delay-ms: 30000
    priority:
      high: [DIRECT_CALL]
      normal: [MQ, BEHAVIOR, EVENT, EVENT_TRIGGER, API_CALL]
      low: [SCHEDULED]
      low-ratio: 0.5
      high-max-concurrency-ratio: 2.0
      overflow-retry-delay-ms: 5000
      overflow-max-retry: 3
  node:
    timeout-ms: 3000
  # Groovy 沙箱（12.9节，预编译缓存）
  groovy:
    timeout-ms: 5000
    max-output-kb: 64
  # 熔断器（12.5节）
  circuit-breaker:
    default:
      failure-threshold: 5
      open-duration-sec: 30
      half-open-attempts: 3
  # 集成层外部系统 URL（dev 指向 WireMock）
  integration:
    coupon-service-url: http://localhost:8099/mock/coupon
    tagger-service-url: http://localhost:8099/mock/tagger
    reach-platform-url: http://localhost:8099/mock/reach
    api-call-base-url: http://localhost:8099/mock/api

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: PID_CANVAS_ENGINE
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
  consumer:
    group: GID_CANVAS_ENGINE

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: canvas-engine

# Nacos 动态配置（生产通过 spring.cloud.nacos.config 接入）
