spring:
  application:
    name: canvas-engine
  main:
    web-application-type: reactive
  datasource:
    url: jdbc:mysql://localhost:3306/canvas_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      # password: （无密码时注释掉）
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

canvas:
  jwt:
    secret: canvas-engine-jwt-secret-key-must-be-at-least-256-bits-long
    expiry-hours: 24
  # 执行引擎配置（可通过 Nacos 动态覆盖）
  execution:
    global-timeout-sec: 600
    context-ttl-sec: 86400        # 多阶段挂起 ctx 的 Redis TTL (24h)
    max-concurrency: 1000         # 单画布最大并发执行数
  node:
    timeout-ms: 3000              # 单节点超时
  groovy:
    timeout-ms: 5000
    max-output-kb: 64
  # 集成层外部系统 URL（dev 环境指向 WireMock）
  integration:
    coupon-service-url: http://localhost:8099/mock/coupon
    tagger-service-url: http://localhost:8099/mock/tagger
    reach-platform-url: http://localhost:8099/mock/reach
    api-call-base-url: http://localhost:8099/mock/api

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: canvas-engine

# Nacos 动态配置（生产通过 spring.cloud.nacos.config 接入）
# canvas.node.timeout-ms: 3000
# canvas.execution.global-timeout-sec: 600
# canvas.execution.max-retry: 3
# canvas.groovy.timeout-ms: 5000
canvas:
  execution:
    max-retry: 3
    retry-base-delay-ms: 1000
    retry-max-delay-ms: 30000
  circuit-breaker:
    default:
      failure-threshold: 5
      open-duration-sec: 30
      half-open-attempts: 3
