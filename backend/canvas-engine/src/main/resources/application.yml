spring:
  application:
    name: canvas-engine
  main:
    web-application-type: reactive
  datasource:
    url: jdbc:mysql://localhost:3306/canvas_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

# JWT 配置（生产环境通过环境变量覆盖 secret）
canvas:
  jwt:
    secret: canvas-engine-jwt-secret-key-must-be-at-least-256-bits-long
    expiry-hours: 24

# Swagger：生产环境设为 false
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    com.photon.canvas: debug
