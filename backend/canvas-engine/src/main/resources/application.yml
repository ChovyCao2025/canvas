spring:
  application:
    name: canvas-engine
  main:
    web-application-type: reactive
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:mysql://localhost:3306/canvas_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 33
      minimum-idle: 8
      connection-timeout: 3000
      validation-timeout: 1000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 60000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    placeholder-replacement: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms
      # password: （无密码时注释掉）
      lettuce:
        pool:
          max-active: 64
          max-idle: 32
          min-idle: 8
          max-wait: 100ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080
  shutdown: graceful

canvas:
  examples:
    enabled: ${CANVAS_EXAMPLES_ENABLED:true}
  ai:
    prediction:
      enabled: ${CANVAS_AI_PREDICTION_ENABLED:false}
      batch-size: ${CANVAS_AI_PREDICTION_BATCH_SIZE:500}
      default-best-send-hour: ${CANVAS_AI_PREDICTION_DEFAULT_BEST_SEND_HOUR:20}
      sparse-history-min-events: ${CANVAS_AI_PREDICTION_SPARSE_HISTORY_MIN_EVENTS:3}
      model-version: ${CANVAS_AI_PREDICTION_MODEL_VERSION:baseline_v1}
  jwt:
    secret: ${CANVAS_JWT_SECRET:}
    expiry-hours: 24
  events:
    report-secret: ${CANVAS_EVENT_REPORT_SECRET:canvas-event-report-secret-2026!!}
  cdp:
    event-topic: ${CANVAS_CDP_EVENT_TOPIC:CDP_EVENT_INGESTED}
    ingestion:
      max-batch-size: ${CANVAS_CDP_INGESTION_MAX_BATCH_SIZE:100}
  internal-api:
    token: ${CANVAS_INTERNAL_API_TOKEN:}
  public-trigger:
    secret: ${CANVAS_PUBLIC_TRIGGER_SECRET:${CANVAS_EVENT_REPORT_SECRET:canvas-event-report-secret-2026!!}}
  secret-cipher:
    key: ${CANVAS_SECRET_CIPHER_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
  cors:
    # 生产环境必须改为实际前端域名，禁止用 * 上线
    # 覆盖方式：CANVAS_CORS_ALLOWED_ORIGINS=https://canvas.yourcompany.com
    allowed-origins: "*"
    allow-credentials: true
  redis:
    key-prefix: canvas  # key 命名空间前缀（设计文档 25.3.1节），多环境共用 Redis 时修改
  doris:
    enabled: ${CANVAS_DORIS_ENABLED:false}
    jdbc-url: ${CANVAS_DORIS_JDBC_URL:jdbc:mysql://localhost:9030/canvas_dws?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${CANVAS_DORIS_USERNAME:root}
    password: ${CANVAS_DORIS_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    stream-load-url: ${CANVAS_DORIS_STREAM_LOAD_URL:http://localhost:8040/api/canvas_ods/canvas_execution_trace/_stream_load}
    stream-load-timeout-ms: ${CANVAS_DORIS_STREAM_LOAD_TIMEOUT_MS:3000}
    pool:
      size: ${CANVAS_DORIS_POOL_SIZE:10}
  version:
    max-keep-count: 10  # 每个画布保留最近 N 个已发布版本（设计文档 17.2节）
  validation:
    max-node-count: ${CANVAS_VALIDATION_MAX_NODE_COUNT:1000}
    max-goto-jumps: ${CANVAS_VALIDATION_MAX_GOTO_JUMPS:100}
    max-loop-iterations: ${CANVAS_VALIDATION_MAX_LOOP_ITERATIONS:1000}
  # Disruptor 无锁分发层（12.8节）
  disruptor:
    ring-buffer-size: 65536   # 必须是 2 的幂，2^16 ≈ 16MB
    consumers: 0              # 0 = 自动使用 CPU 核数
  # 执行引擎
  execution:
    global-timeout-sec: 600
    shutdown-drain-timeout-ms: 10000
    context-ttl-sec: 86400
    max-concurrency: 3000
    per-canvas-max-concurrent: 50
    max-retry: 3
    retry-base-delay-ms: 1000
    retry-max-delay-ms: 30000
    priority:
      high: [DIRECT_CALL]
      normal: [MQ, BEHAVIOR, EVENT, EVENT_TRIGGER, API_CALL]
      low: [SCHEDULED]
      low-ratio: 0.5
      high-max-concurrency-ratio: 2.0
      overflow-retry-delay-ms: 5000
      overflow-max-retry: 3
  execution-lane:
    light:
      max-concurrency: 600
      queue-limit: 2000
    standard:
      max-concurrency: 1800
      queue-limit: 10000
    heavy:
      max-concurrency: 300
      queue-limit: 1000
    retry:
      max-concurrency: 300
      queue-limit: 3000
  background-tasks:
    max-in-flight: 1000
    shutdown-timeout-ms: 5000
  execution-request:
    dispatch-batch-size: 200
    dispatch-fixed-delay-ms: 1000
    retry-delay-ms: 5000
    max-attempts: 5
    running-stale-sec: 300
    max-retry-delay-ms: 60000
    heartbeat-interval-ms: 60000
    per-canvas-batch-limit: 0
    replay:
      single-per-minute: 60
      batch-requests-per-minute: 1000
  node:
    timeout-ms: 3000
  mq:
    topic: CANVAS_MQ_TRIGGER
    consume-thread-number: ${CANVAS_MQ_CONSUME_THREAD:20}
  notifications:
    websocket:
      max-sessions-per-user: ${CANVAS_NOTIFICATION_WS_MAX_SESSIONS_PER_USER:5}
      max-total-sessions: ${CANVAS_NOTIFICATION_WS_MAX_TOTAL_SESSIONS:1000}
  delivery:
    outbox:
      topic: ${CANVAS_DELIVERY_OUTBOX_TOPIC:CANVAS_DELIVERY}
      mq-publish-enabled: ${CANVAS_DELIVERY_OUTBOX_MQ_PUBLISH_ENABLED:false}
      max-attempts: ${CANVAS_DELIVERY_OUTBOX_MAX_ATTEMPTS:3}
      retry-base-delay-ms: ${CANVAS_DELIVERY_OUTBOX_RETRY_BASE_DELAY_MS:1000}
      retry-max-delay-ms: ${CANVAS_DELIVERY_OUTBOX_RETRY_MAX_DELAY_MS:60000}
      stale-seconds: ${CANVAS_DELIVERY_OUTBOX_STALE_SECONDS:300}
      reconciliation:
        enabled: ${CANVAS_DELIVERY_OUTBOX_RECONCILIATION_ENABLED:false}
        limit: ${CANVAS_DELIVERY_OUTBOX_RECONCILIATION_LIMIT:100}
        fixed-delay-ms: ${CANVAS_DELIVERY_OUTBOX_RECONCILIATION_FIXED_DELAY_MS:60000}
    receipt:
      secret: ${CANVAS_DELIVERY_RECEIPT_SECRET:}
  scheduler:
    jitter-max-ms: 300000
    trigger-concurrency: 100
  delay:
    jitter-max-ms: 0
  http-client:
    max-connections: 500
    pending-acquire-max-count: 2000
    pending-acquire-timeout-ms: 1000
    connect-timeout-ms: 1000
    response-timeout-ms: 3000
    write-timeout-ms: 3000
  # Groovy 沙箱（12.9节，预编译缓存）
  groovy:
    timeout-ms: 5000
    max-output-kb: 64
  # 熔断器（12.5节）
  circuit-breaker:
    default:
      failure-threshold: 5
      open-duration-sec: 30
      half-open-attempts: 3
    redis:
      key-prefix: cb:
      pub-sub-channel: circuit-breaker-events
      local-cache-ttl-sec: 5
  # 集成层外部系统 URL（dev 指向 WireMock）
  integration:
    coupon-service-url: http://localhost:8099/mock/coupon
    tagger-service-url: http://localhost:8099/mock/tagger
    reach-platform-url: http://localhost:8099/mock/reach
    api-call-base-url: http://localhost:8099/mock/api

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: PID_CANVAS_ENGINE
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
  consumer:
    group: GID_CANVAS_ENGINE

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: canvas-engine

