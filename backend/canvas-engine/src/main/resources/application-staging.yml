spring:
  datasource:
    # Staging uses production-like Secret-backed database wiring with smaller default pool size.
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:4}
  flyway:
    # Keep migration behavior production-like while allowing env override for rehearsal jobs.
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
    placeholder-replacement: false
  data:
    redis:
      # Staging Redis should be isolated from production because route keys are mutable runtime state.
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD}

canvas:
  frontend:
    # Staging frontend/API base URL is injected by deployment pipeline.
    api-base-url: ${CANVAS_FRONTEND_API_BASE_URL}
  cors:
    # Explicit staging origins mirror production CORS behavior.
    allowed-origins: ${CANVAS_CORS_ALLOWED_ORIGINS}
    allow-credentials: true
  events:
    report-secret: ${CANVAS_EVENT_REPORT_SECRET}
  internal-api:
    token: ${CANVAS_INTERNAL_API_TOKEN}
  public-trigger:
    secret: ${CANVAS_PUBLIC_TRIGGER_SECRET:${CANVAS_EVENT_REPORT_SECRET}}
  secret-cipher:
    key: ${CANVAS_SECRET_CIPHER_KEY}
  jwt:
    secret: ${CANVAS_JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        # Keep Prometheus enabled so staging load tests expose the same runtime metrics.
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    # Staging does not publish API docs unless a separate docs deployment enables them.
    enabled: false
  swagger-ui:
    enabled: false

rocketmq:
  # Staging producer/consumer groups are separate from prod to avoid consuming live messages.
  name-server: ${ROCKETMQ_NAME_SERVER}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:PID_CANVAS_ENGINE_STAGING}
  consumer:
    group: ${ROCKETMQ_CONSUMER_GROUP:GID_CANVAS_ENGINE_STAGING}
