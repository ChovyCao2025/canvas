name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test canvas-engine
        run: mvn -f backend/pom.xml -pl canvas-engine -am test

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run Vitest
        run: npm test -- --run
        working-directory: frontend

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build Vite app
        run: npm run build
        working-directory: frontend

  migration-validation:
    name: Flyway migration validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Check Flyway migration naming policy
        run: bash scripts/release/check-flyway-migration.sh
      - name: Run migration policy test
        run: mvn -f backend/pom.xml -pl canvas-engine -am -Dtest=FlywayMigrationPolicyTest test

  open-source-growth-guardrails:
    name: Open Source Growth guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run guardrail verifier tests
        run: node --test tools/open-source-growth/guardrail-verifier.test.mjs
      - name: Verify guardrail artifacts
        run: node tools/open-source-growth/guardrail-verifier.mjs

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-test
      - frontend-build
      - migration-validation
      - open-source-growth-guardrails
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/canvas-engine/Dockerfile backend
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile frontend
