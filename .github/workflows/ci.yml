name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-test:
    name: Boot backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test canvas-boot backend reactor
        run: mvn -f backend/pom.xml -pl canvas-boot -am test

  boot-runtime-test:
    name: Boot runtime tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test canvas-boot runtime gates
        run: mvn -f backend/pom.xml -pl canvas-boot -am -Dtest=ModularArchitectureTest,CanvasBootApplicationSmokeTest test

  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run Vitest
        run: npm test -- --run
        working-directory: frontend

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build Vite app
        run: npm run build
        working-directory: frontend

  migration-validation:
    name: Flyway migration validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Check Flyway migration naming policy
        run: bash scripts/release/check-flyway-migration.sh
      - name: Run migration policy test
        run: mvn -f backend/pom.xml -pl canvas-boot -am -Dtest=FlywayMigrationPolicyTest test

  open-source-growth-guardrails:
    name: Open Source Growth guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
      - name: Run Canvas CLI behavior tests
        run: npm test
        working-directory: tools/canvas-cli
      - name: Validate demo compose config
        run: docker compose -f docker-compose.demo.yml config
      - name: Run playground runtime smoke
        run: node tools/open-source-growth/playground-runtime-smoke.mjs
      - name: Run guardrail verifier tests
        run: node --test tools/open-source-growth/guardrail-verifier.test.mjs
      - name: Verify guardrail artifacts
        run: node tools/open-source-growth/guardrail-verifier.mjs

  cutover-preflight:
    name: DDD cutover preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
      - name: Run G0 coordination checks
        run: bash docs/program-coordination/checks/program-coordination-checks.sh .
      - name: Verify dispatch state
        run: node tools/program-coordination/check-dispatch-state.mjs .
      - name: Run program coordination tests
        run: node --test tools/program-coordination/*.test.mjs
      - name: Require cutover readiness
        run: node tools/program-coordination/cutover-compatibility-preflight.mjs . --require-ready

  helm-render:
    name: Helm render smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Render Helm chart variants
        run: bash scripts/release/verify-helm-render.sh

  release-dry-run:
    name: Release dry-run gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check release script syntax
        run: bash -n scripts/release/*.sh
      - name: Check backend image dry-run
        run: CANVAS_IMAGE_TAG=${{ github.sha }} bash scripts/release/build-image.sh --dry-run --image canvas-boot
      - name: Check pre-deploy dry-run
        run: bash scripts/release/pre-deploy-check.sh --dry-run
      - name: Check post-deploy dry-run
        run: bash scripts/release/post-deploy-check.sh --dry-run
      - name: Check rollback drill dry-run
        run: bash scripts/release/rollback-drill.sh --dry-run
      - name: Check production Flink deployment contract
        run: bash scripts/verify-flink-production-deployment.sh

  release-cutover-readiness:
    name: Release cutover readiness bundle
    runs-on: ubuntu-latest
    needs:
      - open-source-growth-guardrails
      - cutover-preflight
      - helm-render
      - release-dry-run
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
      - name: Verify release cutover readiness bundle
        run: node tools/program-coordination/release-cutover-readiness.mjs . --json

  docker-build:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - boot-runtime-test
      - frontend-test
      - frontend-build
      - migration-validation
      - open-source-growth-guardrails
      - cutover-preflight
      - helm-render
      - release-dry-run
      - release-cutover-readiness
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build backend image
        run: CANVAS_IMAGE_TAG=${{ github.sha }} bash scripts/release/build-image.sh --image canvas-boot
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile frontend
