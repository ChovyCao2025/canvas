name: canvas-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: cd backend && mvn -pl canvas-boot -am test

  backend-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: cd backend && mvn -pl canvas-boot -am -P integration-tests -Dtest=*IntegrationTest test

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm test
      - run: cd frontend && npm run build

  profile-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/release/validate-production-profile.sh

  flyway-migration-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: bash scripts/release/check-flyway-migration.sh
      - run: cd backend && mvn -pl canvas-boot -am -Dtest=FlywayMigrationPolicyTest test

  open-source-growth-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --test tools/open-source-growth/guardrail-verifier.test.mjs
      - run: node tools/open-source-growth/guardrail-verifier.mjs

  cutover-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node tools/program-coordination/check-dispatch-state.mjs .
      - run: node --test tools/program-coordination/cutover-compatibility-preflight.test.mjs
      - run: node tools/program-coordination/cutover-compatibility-preflight.mjs . --require-ready

  deployment-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: bash -n scripts/release/*.sh
      - run: bash scripts/release/verify-helm-render.sh
      - run: CANVAS_IMAGE_TAG=${{ github.sha }} bash scripts/release/build-image.sh --dry-run --image canvas-boot
      - run: bash scripts/release/pre-deploy-check.sh --dry-run
      - run: bash scripts/release/post-deploy-check.sh --dry-run
      - run: bash scripts/release/rollback-drill.sh --dry-run
      - run: test -f deploy/k8s/canvas-engine-deployment.yaml
      - run: test -f deploy/k8s/canvas-engine-service.yaml
      - run: test -f deploy/k8s/canvas-engine-hpa.yaml
      - run: test -f deploy/k8s/canvas-engine-network-policy.yaml

  container-build:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - backend-integration-tests
      - profile-validation
      - flyway-migration-policy
      - open-source-growth-guardrails
      - cutover-preflight
      - deployment-config
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: CANVAS_IMAGE_TAG=${{ github.sha }} bash scripts/release/build-image.sh --image canvas-boot
