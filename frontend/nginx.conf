server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compress text assets served by the SPA container.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;

  # Fingerprinted static assets are immutable and can be cached aggressively.
  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # API paths are proxied to canvas-engine; the upstream is injected by Helm/compose env.
  location ~ ^/(auth|admin|canvas|ops|message-deliveries|delivery|cdp|bi)(/|$) {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass ${CANVAS_API_UPSTREAM};
  }

  # React Router fallback keeps deep links working after browser refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
