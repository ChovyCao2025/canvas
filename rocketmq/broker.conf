# Local RocketMQ broker configuration for docker-compose development.
#
# brokerIP1 is pinned to localhost so the backend running on the host can connect
# to the broker listener published by docker compose.
brokerClusterName=DefaultCluster
brokerName=broker-a
brokerId=0
brokerIP1=127.0.0.1
# Local development keeps topic auto-creation enabled so canvas MQ trigger tests can bootstrap topics.
autoCreateTopicEnable=true
